<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shukrons_cake — Витрина Худжанд</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Плавное скрытие скроллбара для красивых категорий */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Дополнительный стиль для размытия заднего фона Lightbox */
        .modal-backdrop-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Стильный кондитерский паттерн для фона */
        .premium-bg {
            background-color: #fff5f6;
            background-image: radial-gradient(#fda4af 0.75px, transparent 0.75px), radial-gradient(#fda4af 0.75px, #fff5f6 0.75px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }
    </style>
</head>

<body class="premium-bg text-gray-800 font-sans p-4 pb-36 selection:bg-rose-200 min-h-screen">
    <div class="max-w-md mx-auto">

        <!-- Шапка витрины с Вашим Логотипом -->
        <div
            class="text-center mb-6 mt-2 bg-white/90 backdrop-blur-md rounded-3xl p-5 shadow-[0_8px_30px_rgb(251,113,133,0.08)] border border-rose-100/60 flex flex-col items-center">
            <!-- Блок логотипа -->
            <div
                class="w-24 h-24 mb-3 rounded-full overflow-hidden shadow-md border-2 border-rose-200 bg-white flex items-center justify-center">
                <img src="logo.jpg.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>

            <h1
                class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-600 to-pink-500 tracking-wider drop-shadow-sm">
                🌸 SHUKRONS CAKE 🌸</h1>
            <p class="text-xs text-rose-400 font-bold mt-1.5 flex items-center justify-center gap-1">
                <span>✨ Домашние десерты в Худжанде с любовью</span>
                <span class="animate-pulse">💕</span>
            </p>
        </div>

        <!-- Фильтр категорий -->
        <div class="mb-6 sticky top-2 z-40 bg-transparent py-1 rounded-2xl">
            <div class="flex overflow-x-auto gap-2.5 pb-1 no-scrollbar" id="categories-tabs">
                <button onclick="filterCategory('Все')" id="cat-all"
                    class="whitespace-nowrap px-5 py-2.5 rounded-2xl text-xs font-black transition-all duration-300 bg-gradient-to-r from-rose-500 to-pink-500 text-white shadow-md shadow-rose-200/80 scale-100">
                    ✨ Все меню
                </button>
            </div>
        </div>

        <!-- Лоадер при загрузке JSON -->
        <div id="loader" class="text-center py-12">
            <div class="inline-block w-8 h-8 border-4 border-rose-500 border-t-transparent rounded-full animate-spin">
            </div>
            <p class="text-xs text-rose-400 font-semibold mt-3">Загружаем свежие вкусняшки... 🧁</p>
        </div>

        <!-- Сетка товаров -->
        <div class="space-y-5" id="products-grid"></div>

    </div>

    <!-- Фиксированная нижняя панель корзины -->
    <div id="cart-panel"
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-rose-100/60 p-4 shadow-[0_-10px_40px_rgba(225,29,72,0.12)] transform translate-y-full transition-all duration-300 z-50 rounded-t-[2.5rem]">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4">
            <div>
                <p class="text-[10px] text-gray-400 font-extrabold uppercase tracking-widest">Сладкий выбор:</p>
                <p id="cart-summary" class="text-sm font-black text-gray-800 mt-0.5">0 десертов</p>
            </div>
            <button onclick="sendOrder()"
                class="flex-1 bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-white font-black py-3.5 px-6 rounded-2xl transition-all active:scale-[0.97] shadow-lg shadow-rose-200 flex items-center justify-between">
                <span class="text-sm tracking-wide">Оформить заказ</span>
                <span id="total-price"
                    class="bg-white/20 backdrop-blur-sm text-white text-xs px-3 py-1 rounded-xl font-black border border-white/10">0
                    смн.</span>
            </button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ДЛЯ ПРОСМОТРА ФОТО (LIGHTBOX) -->
    <div id="photo-modal" onclick="closePhotoModal()"
        class="fixed inset-0 bg-black/85 z-[100] hidden items-center justify-center flex-col p-4 cursor-zoom-out modal-backdrop-blur transition-opacity duration-300 opacity-0">
        <span
            class="absolute top-5 right-6 text-white text-4xl font-light cursor-pointer opacity-60 hover:opacity-100 transition-opacity">&times;</span>
        <img id="modal-img"
            class="max-w-full max-h-[70vh] object-contain rounded-3xl shadow-2xl border border-white/10 transform scale-95 transition-transform duration-300"
            src="" alt="Десерт крупным планом">
        <div id="modal-caption"
            class="mt-5 text-white text-sm font-black text-center tracking-wide bg-white/10 backdrop-blur-md py-2 px-5 rounded-full border border-white/10 shadow-lg">
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();

        let allProducts = [];
        let currentCategory = 'Все';
        const cart = {};

        async function loadProducts() {
            try {
                const response = await fetch('products.json?v=' + Date.now());
                allProducts = await response.json();

                document.getElementById('loader').classList.add('hidden');
                generateCategoryTabs();
                renderProducts();
            } catch (error) {
                console.error("Ошибка при загрузке продуктов:", error);
                document.getElementById('loader').innerHTML = `
                    <p class="text-sm text-rose-500 font-semibold">Не удалось загрузить меню витрины... 🥺</p>
                    <p class="text-xs text-gray-400 mt-1">Проверьте генерацию файла products.json ботом</p>
                `;
            }
        }

        function generateCategoryTabs() {
            const tabsContainer = document.getElementById('categories-tabs');
            const categories = new Set();

            allProducts.forEach(p => {
                if (p.category) categories.add(p.category);
            });

            categories.forEach(catName => {
                const btn = document.createElement('button');
                btn.innerText = catName;
                btn.id = `cat-${catName}`;
                btn.className = "whitespace-nowrap px-5 py-2.5 rounded-2xl text-xs font-bold transition-all duration-300 bg-white text-gray-500 border border-rose-100/70 hover:bg-rose-50 shadow-sm shadow-rose-100/40";
                btn.onclick = () => filterCategory(catName);
                tabsContainer.appendChild(btn);
            });
        }

        function filterCategory(category) {
            currentCategory = category;

            const buttons = document.querySelectorAll('#categories-tabs button');
            buttons.forEach(btn => {
                btn.className = "whitespace-nowrap px-5 py-2.5 rounded-2xl text-xs font-bold transition-all duration-300 bg-white text-gray-500 border border-rose-100/70 shadow-sm shadow-rose-100/40";
            });

            const activeId = category === 'Все' ? 'cat-all' : `cat-${category}`;
            const activeBtn = document.getElementById(activeId);
            if (activeBtn) {
                activeBtn.className = "whitespace-nowrap px-5 py-2.5 rounded-2xl text-xs font-black transition-all duration-300 bg-gradient-to-r from-rose-500 to-pink-500 text-white shadow-md shadow-rose-200/80";
            }

            renderProducts();
        }

        function openPhotoModal(imageUrl, productName) {
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-img');
            const modalCaption = document.getElementById('modal-caption');

            modalImg.src = imageUrl;
            modalCaption.innerText = productName;

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalImg.classList.remove('scale-95');
            }, 10);

            if (tg.BackButton) {
                tg.BackButton.show();
                tg.BackButton.onClick(closePhotoModal);
            }
        }

        function closePhotoModal() {
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-img');

            modal.classList.add('opacity-0');
            modalImg.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);

            if (tg.BackButton) {
                tg.BackButton.hide();
            }
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            const filtered = currentCategory === 'Все'
                ? allProducts
                : allProducts.filter(p => p.category === currentCategory);

            if (filtered.length === 0) {
                grid.innerHTML = `<p class="text-center text-xs text-gray-400 py-12">В этой категории пока пусто... 🌸</p>`;
                return;
            }

            filtered.forEach(product => {
                const count = cart[product.name] ? cart[product.name].quantity : 0;
                const cleanBadge = product.category.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF]/g, '').trim();

                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] shadow-[0_10px_30px_rgba(244,63,94,0.06)] border border-rose-100/70 overflow-hidden transition-all duration-300 hover:shadow-lg group";
                card.innerHTML = `
                    <div class="relative overflow-hidden">
                        <img class="w-full h-56 object-cover cursor-zoom-in transition-transform duration-500 group-hover:scale-105" 
                             src="${product.image_url}" 
                             loading="lazy"
                             alt="${product.name}" 
                             onclick="openPhotoModal('${product.image_url}', '${product.name.replace(/'/g, "\\'")}')"
                             onerror="this.src='https://placehold.co/600x400?text=Shukrons+Cake'">
                        <span class="absolute top-4 left-4 bg-white/95 backdrop-blur-md text-rose-600 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest border border-rose-100/30 shadow-sm">${cleanBadge}</span>
                    </div>
                    <div class="p-5">
                        <h2 class="text-lg font-extrabold text-gray-800 leading-snug">${product.name}</h2>
                        <p class="text-xs text-gray-500 font-medium mt-2 leading-relaxed whitespace-pre-line">${product.description}</p>
                        <div class="flex justify-between items-center mt-5 pt-1">
                            <span class="text-xl font-black text-rose-600 tracking-tight">${product.price} <span class="text-xs font-bold text-rose-400">смн.</span></span>
                            <div class="flex items-center bg-rose-50/60 rounded-2xl p-1 border border-rose-100/40 shadow-inner">
                                <button onclick="changeQuantity('${product.name}', ${product.price}, -1)"
                                    class="text-rose-500 w-8 h-8 rounded-xl font-black text-lg hover:bg-white bg-transparent transition-all flex items-center justify-center active:scale-90 border border-transparent shadow-none">${count > 0 ? '-' : '—'}</button>
                                <span id="count-${product.name}" class="font-black text-xs w-7 text-center text-gray-700">${count}</span>
                                <button onclick="changeQuantity('${product.name}', ${product.price}, 1)"
                                    class="bg-gradient-to-r from-rose-500 to-pink-500 text-white w-8 h-8 rounded-xl font-black text-lg hover:from-rose-600 hover:to-pink-600 shadow-sm shadow-rose-200 transition-all flex items-center justify-center active:scale-90">+</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function changeQuantity(name, price, change) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            if (!cart[name]) {
                cart[name] = { price: price, quantity: 0 };
            }

            cart[name].quantity += change;

            if (cart[name].quantity <= 0) {
                delete cart[name];
                const el = document.getElementById(`count-${name}`);
                if (el) el.innerText = 0;
            } else {
                const el = document.getElementById(`count-${name}`);
                if (el) el.innerText = cart[name].quantity;
            }

            updateCartPanel();
        }

        function updateCartPanel() {
            let totalItems = 0;
            let totalPrice = 0;

            for (const key in cart) {
                totalItems += cart[key].quantity;
                totalPrice += cart[key].price * cart[key].quantity;
            }

            const panel = document.getElementById('cart-panel');
            const summary = document.getElementById('cart-summary');
            const priceTag = document.getElementById('total-price');

            if (totalItems > 0) {
                panel.classList.remove('translate-y-full');
                summary.innerText = `${totalItems} шт. десертов`;
                priceTag.innerText = `${totalPrice} смн.`;
            } else {
                panel.classList.add('translate-y-full');
            }
        }

        function sendOrder() {
            const orderList = [];
            let grandTotal = 0;

            for (const name in cart) {
                const item = cart[name];
                const cost = item.price * item.quantity;
                grandTotal += cost;
                orderList.push({
                    name: name,
                    quantity: item.quantity,
                    price: item.price,
                    cost: cost
                });
            }

            const orderData = {
                items: orderList,
                total_price: grandTotal
            };

            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        window.onload = loadProducts;
    </script>
</body>

</html>
