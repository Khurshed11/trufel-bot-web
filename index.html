<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shukrons_cake — Витрина Худжанд</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Плавное скрытие скроллбара для красивых категорий */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Дополнительный стиль для размытия заднего фона Lightbox */
        .modal-backdrop-blur {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>

<body class="bg-rose-50/40 text-gray-800 font-sans p-4 pb-32 selection:bg-rose-200">
    <div class="max-w-md mx-auto">

        <!-- Шапка витрины -->
        <div class="text-center mb-5 mt-2 bg-white rounded-3xl p-5 shadow-sm border border-rose-100/60">
            <h1 class="text-2xl font-black text-rose-600 tracking-wide drop-shadow-sm">🌸 SHUKRONS CAKE 🌸</h1>
            <p class="text-xs text-rose-400 font-semibold mt-1 flex items-center justify-center gap-1">
                <span>✨ Домашние десерты в Худжанде с любовью</span>
                <span class="animate-pulse">💕</span>
            </p>
        </div>

        <!-- Поисковая строка и фильтр категорий -->
        <div class="mb-5 sticky top-2 z-40 bg-rose-50/80 backdrop-blur-md py-1 rounded-2xl">
            <div class="flex overflow-x-auto gap-2 pb-1 no-scrollbar" id="categories-tabs">
                <button onclick="filterCategory('Все')" id="cat-all"
                    class="whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition bg-rose-500 text-white shadow-md shadow-rose-200">
                    ✨ Все меню
                </button>
                <!-- Сюда JS автоматически добавит вкладки из вашей БД -->
            </div>
        </div>

        <!-- Лоадер при загрузке JSON -->
        <div id="loader" class="text-center py-12">
            <div class="inline-block w-8 h-8 border-4 border-rose-500 border-t-transparent rounded-full animate-spin">
            </div>
            <p class="text-xs text-rose-400 font-medium mt-3">Загружаем свежие вкусняшки... 🧁</p>
        </div>

        <!-- Сетка товаров (Рендерится динамически из БД через products.json) -->
        <div class="space-y-4" id="products-grid"></div>

    </div>

    <!-- Фиксированная нижняя панель корзины -->
    <div id="cart-panel"
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-rose-100 p-4 shadow-[0_-8px_30px_rgba(225,29,72,0.06)] transform translate-y-full transition-all duration-300 z-50 rounded-t-3xl">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Ваш сладкий выбор:</p>
                <p id="cart-summary" class="text-sm font-black text-gray-800">0 десертов</p>
            </div>
            <button onclick="sendOrder()"
                class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-6 rounded-2xl transition-all active:scale-95 shadow-lg shadow-rose-200 flex items-center gap-3">
                <span>Оформить заказ</span>
                <span id="total-price" class="bg-rose-600 text-white text-xs px-2.5 py-1 rounded-xl font-extrabold">0
                    смн.</span>
            </button>
        </div>
    </div>

    <!-- КРАСИВОЕ МОДАЛЬНОЕ ОКНО ДЛЯ ПРОСМОТРА ФОТО (LIGHTBOX) -->
    <div id="photo-modal" onclick="closePhotoModal()"
        class="fixed inset-0 bg-black/80 z-[100] hidden items-center justify-center flex-col p-4 cursor-zoom-out modal-backdrop-blur transition-opacity duration-300 opacity-0">
        <span
            class="absolute top-5 right-6 text-white text-4xl font-bold cursor-pointer opacity-70 hover:opacity-100">&times;</span>
        <img id="modal-img"
            class="max-w-full max-h-[75vh] object-contain rounded-2xl shadow-2xl border border-white/10 transform scale-95 transition-transform duration-300"
            src="" alt="Десерт крупным планом">
        <div id="modal-caption"
            class="mt-4 text-white text-lg font-bold text-center px-4 tracking-wide bg-black/40 py-1.5 px-4 rounded-full border border-white/5">
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Хранилища данных
        let allProducts = [];
        let currentCategory = 'Все';
        const cart = {};

        // Загрузка товаров из products.json
        async function loadProducts() {
            try {
                const response = await fetch('products.json?v=' + Date.now()); // Защита от кэширования
                allProducts = await response.json();

                document.getElementById('loader').classList.add('hidden');
                generateCategoryTabs();
                renderProducts();
            } catch (error) {
                console.error("Ошибка при загрузке продуктов:", error);
                document.getElementById('loader').innerHTML = `
                    <p class="text-sm text-rose-500 font-semibold">Не удалось загрузить меню витрины... 🥺</p>
                    <p class="text-xs text-gray-400 mt-1">Проверьте генерацию файла products.json ботом</p>
                `;
            }
        }

        // Динамическое создание вкладок категорий на основе данных из JSON
        function generateCategoryTabs() {
            const tabsContainer = document.getElementById('categories-tabs');
            const categories = new Set();

            allProducts.forEach(p => {
                if (p.category) categories.add(p.category);
            });

            categories.forEach(catName => {
                const btn = document.createElement('button');
                btn.innerText = catName;
                btn.id = `cat-${catName}`;
                btn.className = "whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition bg-white text-gray-600 border border-rose-100 hover:bg-rose-50";
                btn.onclick = () => filterCategory(catName);
                tabsContainer.appendChild(btn);
            });
        }

        // Фильтрация вкладок
        function filterCategory(category) {
            currentCategory = category;

            // Сброс стилей всех кнопок
            const buttons = document.querySelectorAll('#categories-tabs button');
            buttons.forEach(btn => {
                btn.className = "whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition bg-white text-gray-600 border border-rose-100";
            });

            // Подсветка активной вкладки
            const activeId = category === 'Все' ? 'cat-all' : `cat-${category}`;
            const activeBtn = document.getElementById(activeId);
            if (activeBtn) {
                activeBtn.className = "whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition bg-rose-500 text-white shadow-md shadow-rose-200";
            }

            renderProducts();
        }

        // ЛОГИКА ОТКРЫТИЯ И ЗАКРЫТИЯ LIGHTBOX
        function openPhotoModal(imageUrl, productName) {
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-img');
            const modalCaption = document.getElementById('modal-caption');

            modalImg.src = imageUrl;
            modalCaption.innerText = productName;

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            // Небольшой таймаут для плавного появления анимации CSS
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalImg.classList.remove('scale-95');
            }, 10);
        }

        function closePhotoModal() {
            const modal = document.getElementById('photo-modal');
            const modalImg = document.getElementById('modal-img');

            modal.classList.add('opacity-0');
            modalImg.classList.add('scale-95');

            // Скрываем элемент после завершения анимации перехода
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        }

        // Генерация карточек товаров на витрине
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            const filtered = currentCategory === 'Все'
                ? allProducts
                : allProducts.filter(p => p.category === currentCategory);

            if (filtered.length === 0) {
                grid.innerHTML = `<p class="text-center text-xs text-gray-400 py-8">В этой категории пока пусто... 🌸</p>`;
                return;
            }

            filtered.forEach(product => {
                const count = cart[product.name] ? cart[product.name].quantity : 0;

                // Извлекаем чистый тег без смайлика для бейджа
                const cleanBadge = product.category.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF]/g, '').trim();

                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl shadow-sm border border-rose-100/70 overflow-hidden transition-all duration-300 hover:shadow-md";
                card.innerHTML = `
                    <div class="relative overflow-hidden group">
                        <!-- Добавлен вызов openPhotoModal на клик по картинке и курсор лупы -->
                        <img class="w-full h-52 object-cover cursor-zoom-in active:scale-[0.99] transition-transform duration-200" 
                             src="${product.image_url}" 
                             alt="${product.name}" 
                             onclick="openPhotoModal('${product.image_url}', '${product.name.replace(/'/g, "\\'")}')"
                             onerror="this.src='https://placehold.co/600x400?text=Shukrons+Cake'">
                        <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-rose-600 text-[10px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider border border-rose-50/50 shadow-sm">${cleanBadge}</span>
                    </div>
                    <div class="p-4">
                        <h2 class="text-lg font-bold text-gray-800 leading-tight">${product.name}</h2>
                        <p class="text-xs text-gray-400 font-medium mt-1.5 leading-relaxed">${product.description}</p>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-xl font-black text-rose-600">${product.price} <span class="text-sm font-bold">смн.</span></span>
                            <div class="flex items-center bg-rose-50 rounded-xl p-0.5 border border-rose-100/50">
                                <button onclick="changeQuantity('${product.name}', ${product.price}, -1)"
                                    class="text-rose-600 w-8 h-8 rounded-lg font-black text-base hover:bg-white transition flex items-center justify-center active:scale-90">-</button>
                                <span id="count-${product.name}" class="font-black text-xs w-6 text-center text-gray-700">${count}</span>
                                <button onclick="changeQuantity('${product.name}', ${product.price}, 1)"
                                    class="bg-rose-500 text-white w-8 h-8 rounded-xl font-black text-base hover:bg-rose-600 shadow-sm transition flex items-center justify-center active:scale-90">+</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Логика работы инкремента/декремента корзины
        function changeQuantity(name, price, change) {
            if (!cart[name]) {
                cart[name] = { price: price, quantity: 0 };
            }

            cart[name].quantity += change;

            if (cart[name].quantity <= 0) {
                delete cart[name];
                const el = document.getElementById(`count-${name}`);
                if (el) el.innerText = 0;
            } else {
                const el = document.getElementById(`count-${name}`);
                if (el) el.innerText = cart[name].quantity;
            }

            updateCartPanel();
        }

        // Обновление состояния нижней выезжающей плашки
        function updateCartPanel() {
            let totalItems = 0;
            let totalPrice = 0;

            for (const key in cart) {
                totalItems += cart[key].quantity;
                totalPrice += cart[key].price * cart[key].quantity;
            }

            const panel = document.getElementById('cart-panel');
            const summary = document.getElementById('cart-summary');
            const priceTag = document.getElementById('total-price');

            if (totalItems > 0) {
                panel.classList.remove('translate-y-full');
                summary.innerText = `${totalItems} шт. десертов`;
                priceTag.innerText = `${totalPrice} смн.`;
            } else {
                panel.classList.add('translate-y-full');
            }
        }

        // Сборка заказа и отправка в RAM бота
        function sendOrder() {
            const orderList = [];
            let grandTotal = 0;

            for (const name in cart) {
                const item = cart[name];
                const cost = item.price * item.quantity;
                grandTotal += cost;
                orderList.push({
                    name: name,
                    quantity: item.quantity,
                    price: item.price,
                    cost: cost
                });
            }

            const orderData = {
                items: orderList,
                total_price: grandTotal
            };

            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        // Инициализация скрипта при загрузке страницы
        window.onload = loadProducts;
    </script>
</body>

</html>
